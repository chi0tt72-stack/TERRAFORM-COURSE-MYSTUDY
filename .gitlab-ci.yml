# .gitlab-ci.yml with OIDC authentication
image:
  name: hashicorp/terraform:1.7
  entrypoint: [""]

# Enable ID tokens (GitLab 15.7+)
id_tokens:
  GITLAB_OIDC_TOKEN:
    aud: https://gitlab.com

variables:
  TF_ROOT: ${CI_PROJECT_DIR}/environments/dev
  TF_STATE_NAME: dev
  TF_ADDRESS: ${CI_API_V4_URL}/projects/79981965/terraform/state/${TF_STATE_NAME}
  AWS_DEFAULT_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::877833852920:role/GitLabTerraformRole

cache:
  key: "${TF_ROOT}"
  paths:
    - ${TF_ROOT}/.terraform
    - ${TF_ROOT}/.terraform.lock.hcl

stages:
  - validate
  - plan
  - apply
  - destroy

before_script:
  - cd ${TF_ROOT}
  - terraform --version
  # Install AWS CLI for OIDC authentication
  - apk add --no-cache python3 py3-pip
  - pip3 install --break-system-packages --upgrade awscli
  # Use GITLAB_OIDC_TOKEN (preferred) or fall back to CI_JOB_JWT_V2
  - |
    if [ -n "$GITLAB_OIDC_TOKEN" ]; then
      echo "✓ Using GITLAB_OIDC_TOKEN"
      JWT_TOKEN=$GITLAB_OIDC_TOKEN
    elif [ -n "$CI_JOB_JWT_V2" ]; then
      echo "✓ Using CI_JOB_JWT_V2"
      JWT_TOKEN=$CI_JOB_JWT_V2
    else
      echo "✗ ERROR: No JWT token available!"
      echo "Please enable ID tokens in GitLab settings"
      exit 1
    fi
  # Authenticate using OIDC
  - |
    echo "Attempting OIDC authentication..."
    CREDENTIALS=$(aws sts assume-role-with-web-identity \
      --role-arn ${AWS_ROLE_ARN} \
      --role-session-name "GitLabRunner-${CI_PROJECT_ID}-${CI_PIPELINE_ID}" \
      --web-identity-token ${JWT_TOKEN} \
      --duration-seconds 3600 \
      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
      --output text 2>&1)
    
    if [ $? -eq 0 ]; then
      echo "✓ OIDC authentication successful!"
      export $(printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s" $CREDENTIALS)
      echo "✓ AWS credentials exported"
    else
      echo "✗ OIDC authentication FAILED!"
      echo "Error: $CREDENTIALS"
      exit 1
    fi
  - |
    terraform init -reconfigure \
      -backend-config="address=${TF_ADDRESS}" \
      -backend-config="lock_address=${TF_ADDRESS}/lock" \
      -backend-config="unlock_address=${TF_ADDRESS}/lock" \
      -backend-config="username=gitlab-ci-token" \
      -backend-config="password=${CI_JOB_TOKEN}" \
      -backend-config="lock_method=POST" \
      -backend-config="unlock_method=DELETE" \
      -backend-config="retry_wait_min=5"

validate:
  stage: validate
  script:
    - terraform validate
    - terraform fmt -check -recursive
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

plan:
  stage: plan
  script:
    - terraform plan -out=plan.tfplan
    - terraform show -no-color plan.tfplan > plan.txt
    - terraform show -json plan.tfplan > plan.json
  artifacts:
    name: plan
    paths:
      - ${TF_ROOT}/plan.tfplan
      - ${TF_ROOT}/plan.txt
      - ${TF_ROOT}/plan.json
      - ${TF_ROOT}/.terraform/
      - ${TF_ROOT}/.terraform.lock.hcl
    reports:
      terraform: ${TF_ROOT}/plan.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

apply:
  stage: apply
  script:
    - terraform plan -out=plan.tfplan
    - terraform apply -auto-approve plan.tfplan
  dependencies:
    - plan
  when: manual
  only:
    - main
  environment:
    name: dev
    action: start

destroy:
  stage: destroy
  script:
    - terraform destroy -auto-approve
  when: manual
  only:
    - main
  environment:
    name: dev
    action: stop

